<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sale and Purchase Agreement</title>
        <link rel="stylesheet" href="style.css" />
        <style>
            body {
                margin: 0;
                font-family: sans-serif;
            }

            #pdf_container {
                width: 100%;
                height: 95vh;
                margin-top: 10px;
                position: relative;
            }

            #pdf-preview {
                width: 100%;
                height: 100%;
                border: 1px solid #ccc;
                display: none;
            }

            #loader {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #ffffff;
                z-index: 10;
            }

            .spinner {
                border: 6px solid #f3f3f3;
                border-top: 6px solid #007bff;
                border-radius: 50%;
                width: 60px;
                height: 60px;
                animation: spin 1s linear infinite;
                margin-bottom: 15px;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            .loader-text {
                color: #555;
                font-size: 16px;
            }

            #error-container {
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #fff9f9;
                z-index: 15;
                text-align: center;
                padding: 20px;
                box-sizing: border-box;
            }

            .error-icon {
                font-size: 48px;
                margin-bottom: 15px;
            }

            #error-message {
                color: #dc3545;
                font-size: 18px;
                font-weight: bold;
                max-width: 80%;
            }
        </style>
    </head>
    <body>
        <div
            id="tab-bar"
            style="position: fixed; top: 10px; right: 12px; z-index: 100"
        >
            <button
                id="attachToDealBtn"
                style="
                    display: flex;
                    align-items: center;
                    gap: 6px;
                    padding: 6px 14px;
                    font-size: 14px;
                    font-weight: 500;
                    border-radius: 6px;
                    cursor: pointer;
                    background: #fff;
                    border: 1px solid #ccc;
                    color: #333;
                "
            >
                Attach to Deal
            </button>
        </div>

        <div id="pdf_container">
            <div id="loader">
                <div class="spinner"></div>
                <div class="loader-text">
                    Generating Sale &amp; Purchase Agreement...
                </div>
            </div>

            <div id="error-container">
                <div class="error-icon">⚠️</div>
                <div id="error-message">An unexpected error occurred.</div>
            </div>

            <iframe id="pdf-preview"></iframe>
        </div>

        <script src="//api.bitrix24.com/api/v1/"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
        <script type="module" src="app.js"></script>
    </body>
</html>
